# Render Blueprint — deploys the My Prep Mart backend API.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# creates the web service. You only fill in MONGO_URI (and CLIENT_URL later).
services:
  - type: web
    name: my-prep-mart-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong secret automatically
      - key: MONGO_URI
        sync: false           # you paste your MongoDB Atlas connection string
      - key: CLIENT_URL
        sync: false           # set to your Vercel URL after the frontend deploys
      # ---- AI Question Generator (optional) ----
      - key: AI_API_KEY
        sync: false           # your TokenLab (or other) API key — enables "Generate with AI"
      - key: AI_BASE_URL
        value: https://api.tokenlab.sh/v1
      - key: AI_MODEL
        sync: false           # one OR many model ids, comma-separated (first = default)
