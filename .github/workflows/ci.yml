name: CI

# Validates every push and pull request to main so a broken build is caught
# *before* Vercel (frontend) and Render (backend) auto-deploy it to production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - run: npm run build

  backend:
    name: Backend — install & syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Syntax-check all source files
        run: |
          set -e
          for f in $(find src -name "*.js"); do node --check "$f"; done
          echo "All backend files passed syntax check."
